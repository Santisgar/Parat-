<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Te amo mucho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:#000;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  width:100%;
  height:100%;
  height:100dvh;
  touch-action:none;
}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

#labels{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:10;
  overflow:hidden;
}
.lbl{
  position:absolute;
  color:#ffcc00;
  cursor:pointer;
  pointer-events:auto;
  font-size:clamp(10px,2.8vw,13px);
  font-weight:bold;
  white-space:nowrap;
  user-select:none;
  text-shadow:0 0 8px #ffcc00,0 0 16px rgba(255,204,0,0.4);
  will-change:transform;
  transition:color 0.3s;
  padding:4px 2px;
  -webkit-tap-highlight-color:transparent;
}
.lbl:hover{color:#fff;text-shadow:0 0 14px #fff,0 0 28px #ffd700;}
.lbl.read{color:#aaffaa;text-shadow:0 0 8px #aaffaa;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.88);
  display:none;
  z-index:100;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  padding:16px;
}
#overlay.on{display:flex;}
#carta{
  width:100%;
  max-width:440px;
  padding:clamp(20px,5vw,36px) clamp(16px,5vw,32px);
  background:linear-gradient(145deg,#111,#000);
  border:2px solid #ffcc00;
  border-radius:22px;
  color:#fff;
  text-align:center;
  box-shadow:0 0 50px rgba(255,204,0,0.35);
  animation:pop 0.3s ease;
  max-height:90dvh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
@keyframes pop{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
#carta h2{
  color:#ffcc00;
  font-size:clamp(15px,4vw,20px);
  letter-spacing:2px;
  margin-bottom:18px;
  padding-bottom:12px;
  border-bottom:1px solid #333;
}
#carta p{
  line-height:1.85;
  font-size:clamp(14px,3.5vw,16px);
  font-style:italic;
  color:#ddd;
}
#cerrar{
  margin-top:28px;
  background:#ffcc00;
  color:#000;
  border:none;
  padding:11px 28px;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  font-size:clamp(13px,3.5vw,15px);
  transition:0.25s;
  min-height:44px;
}
#cerrar:hover{background:#fff;transform:scale(1.06);}

#hint{
  position:fixed;
  bottom:calc(70px + env(safe-area-inset-bottom, 0px));
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,204,0,0.5);
  font-size:clamp(10px,2.5vw,12px);
  letter-spacing:1px;
  pointer-events:none;
  z-index:5;
  white-space:nowrap;
}
#progress-bar{
  position:fixed;
  bottom:calc(12px + env(safe-area-inset-bottom, 0px));
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  display:flex;
  align-items:center;
  gap:14px;
  white-space:nowrap;
}
#progress-text{
  color:#ffcc00;
  font-size:clamp(10px,2.5vw,12px);
  letter-spacing:1px;
}
#btn-next{
  background:linear-gradient(135deg,#ffcc00,#ff9900);
  color:#000;
  border:none;
  padding:10px 22px;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  font-size:clamp(12px,3.5vw,15px);
  display:none;
  animation:glow 1.5s infinite alternate;
  min-height:44px;
}
@keyframes glow{from{box-shadow:0 0 10px #ffcc00}to{box-shadow:0 0 30px #ffcc00,0 0 60px #ff9900;}}
#btn-next:hover{transform:scale(1.07);}
</style>
</head>
<body>

<div id="labels"></div>
<div id="overlay">
  <div id="carta">
    <h2 id="ctitulo"></h2>
    <p id="cmensaje"></p>
    <button id="cerrar">Cerrar mensaje</button>
  </div>
</div>
<div id="hint">Toca cualquier frase ✦ Arrastra para girar</div>
<div id="progress-bar">
  <span id="progress-text">0 / 30 leídos</span>
  <button id="btn-next" onclick="irAlRompecabezas()">¡Continuar al rompecabezas! ✨</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const phrases = [
  {s:"Siempre tú",l:"Siempre termino pensando en ti, incluso en los momentos más simples del día. No importa qué esté haciendo, de alguna forma apareces en mi mente sin avisar. Y no es casualidad… es porque tienes un lugar especial que no cualquiera logra ocupar."},
  {s:"Eres luz",l:"Tienes una forma de iluminar todo a tu alrededor que no se puede explicar fácilmente. No es algo que se vea, es algo que se siente. Estar cerca de ti hace que todo sea más claro, más bonito y mucho más tranquilo."},
  {s:"Quédate",l:"Si pudiera pedir algo sin dudarlo, sería que te quedaras un poco más en mi vida. Porque contigo los días son diferentes, más llevaderos, más reales. Y la verdad… me gustaría que eso no se acabara tan rápido."},
  {s:"Mi calma",l:"En medio de todo el ruido, del estrés y de los problemas, tú eres ese punto donde todo se detiene. Donde puedo respirar tranquilo y sentir que nada está tan mal como parece."},
  {s:"Solo tú",l:"Entre tantas personas que pasan por la vida, hay algo en ti que simplemente no se compara con nadie más. No es solo lo que haces, es lo que transmites… y eso es imposible de reemplazar."},
  {s:"Mi lugar",l:"Contigo siento que no tengo que fingir nada, que puedo ser yo completamente. Y eso es raro de encontrar. Es como si, sin darme cuenta, me hubiera encontrado justo donde debía estar."},
  {s:"Eres magia",l:"No sé exactamente qué es lo que tienes, pero hay algo en ti que hace que todo sea más bonito. Incluso los días normales se sienten especiales cuando estás presente."},
  {s:"Mi paz",l:"Hay personas que llegan a complicarlo todo… pero tú haces lo contrario. Contigo todo se siente más simple, más tranquilo, como si el mundo deja de pesar tanto."},
  {s:"Te pienso",l:"A veces sin darme cuenta, en medio del día, en una canción o en cualquier momento, apareces en mi mente. Y aunque no siempre lo diga, eso pasa más de lo que imaginas."},
  {s:"Eres especial",l:"No es una palabra que use a la ligera. Realmente tienes algo diferente, algo que no se encuentra fácilmente. Y eso es lo que hace que seas tan importante."},
  {s:"Me haces bien",l:"Estar cerca de ti tiene un efecto que no puedo explicar del todo. Es como si todo se acomodara poco a poco, como si las cosas empezaran a tener más sentido."},
  {s:"Mi sonrisa",l:"Muchas de mis sonrisas tienen que ver contigo, aunque no lo sepas. Es algo que simplemente pasa."},
  {s:"Eres tú",l:"No es coincidencia ni suerte… simplemente eres tú. Tu forma de ser, de hablar, de estar… todo eso es lo que hace que todo se sienta diferente."},
  {s:"Mi alegría",l:"Incluso en los días más pesados, tienes la capacidad de cambiar cómo me siento. Es como si trajeras un poco de luz cuando más se necesita."},
  {s:"Contigo",l:"Contigo todo se siente más fácil, más natural. No hay presión, no hay miedo… solo tranquilidad."},
  {s:"Me importas",l:"Más de lo que puedo decir en pocas palabras. De verdad ocupas un lugar importante, y eso no es algo que pase con cualquiera."},
  {s:"Eres diferente",l:"No sé explicarlo bien, pero contigo todo se siente distinto. Hay algo especial que hace que todo tenga más valor."},
  {s:"Mi todo",l:"Poco a poco te has ido convirtiendo en alguien muy importante en mi vida, sin forzarlo, sin planearlo… simplemente pasó."},
  {s:"Me encantas",l:"No es solo una cosa, son muchas. Tu forma de ser, de pensar, de actuar… todo suma y hace que seas alguien increíble."},
  {s:"Mi persona",l:"Si tuviera que elegir a alguien para compartir momentos, pensamientos o incluso silencios… siempre terminaría eligiéndote a ti."},
  {s:"Eres calma",l:"Tienes una energía que transmite tranquilidad. No necesitas hacer mucho, solo estar, y eso ya cambia todo."},
  {s:"Me gustas",l:"No hay explicación complicada, simplemente me gustas tal como eres. Sin cambios, sin condiciones."},
  {s:"Mi refugio",l:"Contigo siento que puedo ser yo mismo sin miedo a ser juzgado. Y eso vale más de lo que parece."},
  {s:"Eres todo",l:"Poco a poco ocupas más espacio en mi vida, en mis pensamientos, en mi día… y la verdad no me molesta en lo absoluto."},
  {s:"Aquí estoy",l:"Pase lo que pase, quiero que sepas que puedes contar conmigo. En los buenos momentos y también en los difíciles."},
  {s:"Me haces feliz",l:"Tu forma de ser tiene un impacto real en mí. No es algo superficial, es algo que se siente de verdad."},
  {s:"No cambies",l:"Tal como eres ahora, eres más que suficiente. No necesitas ser diferente para ser especial."},
  {s:"Eres única",l:"No hay nadie como tú, y eso es exactamente lo que hace que todo esto sea tan especial."},
  {s:"Siempre",l:"No importa cuánto tiempo pase o qué cambie, hay cosas que simplemente permanecen… y tú eres una de ellas."},
  {s:"Te elijo",l:"Entre tanto, entre todos, te sigo eligiendo a ti, una y otra vez, sin dudarlo."}
];

let readCount=0;
const readSet=new Set();

// Canvas ocupa todo el viewport
const W=()=>window.innerWidth;
const H=()=>window.innerHeight;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,W()/H(),0.1,2000);
camera.position.set(0,30,160);
camera.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.insertBefore(renderer.domElement,document.getElementById('labels'));

// Estrellas de fondo
const starPos=new Float32Array(9000);
for(let i=0;i<9000;i++) starPos[i]=(Math.random()-0.5)*1800;
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.22})));

const core=new THREE.Mesh(new THREE.SphereGeometry(14,32,32),new THREE.MeshBasicMaterial({color:0x000000}));
scene.add(core);
const ring=new THREE.Mesh(new THREE.RingGeometry(17,27,64),new THREE.MeshBasicMaterial({color:0xffcc00,side:THREE.DoubleSide,transparent:true,opacity:0.88}));
ring.rotation.x=Math.PI/2;
scene.add(ring);

const galaxy=new THREE.Group();
scene.add(galaxy);

const pPos=new Float32Array(3600*3);
for(let i=0;i<3600;i++){const a=Math.random()*Math.PI*2,r=38+Math.random()*65;pPos[i*3]=Math.cos(a)*r;pPos[i*3+1]=(Math.random()-0.5)*12;pPos[i*3+2]=Math.sin(a)*r;}
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({color:0xffeebb,size:0.28,transparent:true,blending:THREE.AdditiveBlending});
galaxy.add(new THREE.Points(pGeo,pMat));

const bPos=new Float32Array(400*3);
for(let i=0;i<400;i++){const a=Math.random()*Math.PI*2,r=32+Math.random()*50;bPos[i*3]=Math.cos(a)*r;bPos[i*3+1]=(Math.random()-0.5)*10;bPos[i*3+2]=Math.sin(a)*r;}
const bGeo=new THREE.BufferGeometry();
bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
galaxy.add(new THREE.Points(bGeo,new THREE.PointsMaterial({color:0xffcc00,size:0.55,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending})));

// Anclas de etiquetas
const anchors=[];
const labelContainer=document.getElementById('labels');
phrases.forEach((p,i)=>{
  const angle=(i/phrases.length)*Math.PI*2;
  const r=48+Math.random()*28;
  const obj=new THREE.Object3D();
  obj.position.set(Math.cos(angle)*r,(Math.random()-0.5)*18,Math.sin(angle)*r);
  galaxy.add(obj);
  const div=document.createElement('div');
  div.className='lbl';
  div.textContent=p.s;
  div.addEventListener('click',()=>{if(didMove)return;openMsg(p,i,div);});
  div.addEventListener('touchend',e=>{if(didMove)return;e.preventDefault();openMsg(p,i,div);});
  labelContainer.appendChild(div);
  anchors.push({obj,div});
});

function openMsg(p,i,div){
  document.getElementById('ctitulo').textContent=p.s.toUpperCase();
  document.getElementById('cmensaje').textContent=p.l;
  document.getElementById('overlay').classList.add('on');
  if(!readSet.has(i)){
    readSet.add(i);
    div.classList.add('read');
    readCount++;
    document.getElementById('progress-text').textContent=readCount+' / 30 leídos';
    if(readCount===30){
      document.getElementById('btn-next').style.display='inline-block';
      document.getElementById('hint').textContent='¡Leíste todos los mensajes! 💛';
    }
  }
}

// Control de arrastre — unificado mouse y touch
let isDragging=false,prevX=0,prevY=0,rotY=0,rotX=0,didMove=false;

function onPointerDown(x,y){isDragging=true;didMove=false;prevX=x;prevY=y;}
function onPointerMove(x,y){
  if(!isDragging)return;
  const dx=x-prevX,dy=y-prevY;
  if(Math.abs(dx)>2||Math.abs(dy)>2)didMove=true;
  rotY+=dx*0.005;rotX+=dy*0.003;
  rotX=Math.max(-0.9,Math.min(0.9,rotX));
  prevX=x;prevY=y;
}
function onPointerUp(){isDragging=false;}

renderer.domElement.addEventListener('mousedown',e=>onPointerDown(e.clientX,e.clientY));
window.addEventListener('mouseup',onPointerUp);
window.addEventListener('mousemove',e=>onPointerMove(e.clientX,e.clientY));

renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();
  camera.position.z=Math.max(60,Math.min(400,camera.position.z+e.deltaY*0.2));
},{passive:false});

let lastPinchDist=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    lastPinchDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    return;
  }
  onPointerDown(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

window.addEventListener('touchend',onPointerUp);

window.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    camera.position.z=Math.max(60,Math.min(400,camera.position.z-(dist-lastPinchDist)*0.5));
    lastPinchDist=dist;
    return;
  }
  onPointerMove(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

// Clamp labels dentro de la pantalla con margen
const MARGIN=30;
const tmp=new THREE.Vector3();
let t=0;
function animateGalaxy(){
  requestAnimationFrame(animateGalaxy);
  t+=0.016;
  galaxy.rotation.y+=0.0014;
  ring.rotation.z+=0.002;
  scene.rotation.x+=(rotX-scene.rotation.x)*0.06;
  scene.rotation.y+=(rotY-scene.rotation.y)*0.06;
  pMat.opacity=0.45+Math.sin(t*2)*0.25;

  const w=W(),h=H();
  anchors.forEach(({obj,div})=>{
    obj.getWorldPosition(tmp);
    tmp.project(camera);
    const rawX=(tmp.x*0.5+0.5)*w;
    const rawY=(tmp.y*-0.5+0.5)*h;
    const behind=tmp.z>1;
    if(behind){
      div.style.opacity='0';
      div.style.pointerEvents='none';
    } else {
      // Clamp para que las etiquetas no salgan de la pantalla
      const hw=div.offsetWidth/2||40;
      const hh=div.offsetHeight/2||10;
      const cx=Math.max(MARGIN+hw,Math.min(w-MARGIN-hw,rawX));
      const cy=Math.max(MARGIN+hh,Math.min(h-100-hh,rawY));
      div.style.opacity='1';
      div.style.pointerEvents='auto';
      div.style.transform=`translate(-50%,-50%) translate(${cx}px,${cy}px)`;
    }
  });
  renderer.render(scene,camera);
}
animateGalaxy();

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});
</script>
